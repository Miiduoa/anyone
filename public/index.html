<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>想對Miiduoa說什麼</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Playfair+Display:ital,wght@0,700;1,700&display=swap');

:root{
  --color-bg:#0a0a0a; --color-card:#171717; --color-card-soft:#1f1f1f; --color-border:#2a2a2a;
  --color-text:#fafafa; --color-sub:#9b9b9b; --color-accent:#E1306C; --color-orange:#F77737;
  --color-ok:#2ecc71; --color-no:#e74c3c;
  --brand-gradient:linear-gradient(135deg,#833AB4,#E1306C,#F77737);
  --radius-sm:10px; --radius-md:14px; --radius-lg:18px; --radius-xl:22px;
  --font-family-base:'Noto Sans TC','SF Pro Display',-apple-system,sans-serif;
  --font-family-display:'Playfair Display',serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--color-bg);color:var(--color-text);font-family:var(--font-family-base);line-height:1.6}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:#333;border-radius:4px}
input,textarea,button{font-family:inherit}

@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
@keyframes gradientMove{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes heartBeat{0%{transform:scale(1)}15%{transform:scale(1.3)}30%{transform:scale(1)}45%{transform:scale(1.15)}60%{transform:scale(1)}}

.card-hover{
  transition:all .3s cubic-bezier(.4,0,.2,1);
  border-radius:var(--radius-lg);
  background:linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,.01));
}
.card-hover:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(225,48,108,.15)}

.nav{position:sticky;top:0;z-index:100;background:rgba(10,10,10,.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--color-border);padding:0 20px}
.nav-content{max-width:920px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:56px;gap:12px}
.nav-title{cursor:pointer;font-size:20px;font-weight:900;letter-spacing:-.5px;background:var(--brand-gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-family:var(--font-family-display)}
.nav-right{display:flex;align-items:center;gap:10px}
.nav-btns{display:flex;gap:6px}
.nav-btn{background:transparent;border:1px solid transparent;color:var(--color-sub);padding:6px 14px;border-radius:20px;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s}
.nav-btn.active{background:rgba(225,48,108,.15);border-color:rgba(225,48,108,.3);color:var(--color-accent)}

.nav-avatar-wrap{display:flex;align-items:center;gap:8px}
.nav-avatar-link{position:relative;width:34px;height:34px;border-radius:12px;overflow:hidden;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);display:inline-flex;align-items:center;justify-content:center;cursor:pointer}
.nav-avatar-img{width:100%;height:100%;object-fit:cover;display:none}
.nav-avatar-fallback{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;letter-spacing:-.5px;background:var(--brand-gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-family:var(--font-family-display)}
.avatar-edit-btn{display:none;padding:6px 10px;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;background:rgba(225,48,108,.12);border:1px solid rgba(225,48,108,.25);color:var(--color-accent)}

.container{max-width:920px;margin:0 auto;padding:24px 16px 80px}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:12px;z-index:9999;font-size:14px;font-weight:500;box-shadow:0 4px 20px rgba(0,0,0,.4);animation:slideDown .3s ease;color:#fff}
.toast.success{background:var(--color-ok)}
.toast.danger{background:var(--color-no)}

/* Modal */
.modal-backdrop{
  position:fixed; inset:0;
  background:rgba(0,0,0,.65);
  display:none;
  z-index:9998;
  animation:fadeIn .2s ease
}

/* ✅ 修正：iPhone/小螢幕可捲動，不再卡住 */
.modal{
  position:fixed;
  left:50%; top:50%;
  transform:translate(-50%,-50%);
  width:min(560px,calc(100vw - 28px));
  background:rgba(26,26,26,.96);
  border:1px solid rgba(255,255,255,.08);
  border-radius:18px;
  padding:18px;
  z-index:9999;
  display:none;
  box-shadow:0 18px 60px rgba(0,0,0,.55);

  max-height: calc(100vh - 28px);
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

.modal-header{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}
.modal-title{font-size:16px;font-weight:900}
.modal-close{width:34px;height:34px;border-radius:12px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.8);cursor:pointer}
.modal-sub{color:var(--color-sub);font-size:12px;line-height:1.8;margin-bottom:12px}
.modal-preview{width:100%;border-radius:14px;border:1px solid rgba(255,255,255,.08);background:rgba(0,0,0,.25);overflow:hidden}
.modal-preview img{width:100%;display:block}
.modal-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;padding-bottom:6px}
.action-btn{flex:1;min-width:160px;padding:12px 10px;border-radius:12px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);color:rgba(255,255,255,.85);cursor:pointer;font-weight:800;font-size:13px}
.action-btn.primary{border:none;color:#fff;background:var(--brand-gradient);background-size:200% 200%;animation:gradientMove 3s ease infinite}
.action-btn.danger{border:1px solid rgba(231,76,60,.22);background:rgba(231,76,60,.10);color:rgba(231,76,60,.92)}
.action-btn,.nav-btn,.avatar-edit-btn{transition:all .2s ease}
.action-btn:hover,.nav-btn:hover,.avatar-edit-btn:hover{transform:translateY(-1px)}

.mini-card{background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.015));border:1px solid rgba(255,255,255,.08);border-radius:var(--radius-md);padding:12px 14px}
.mini-row{display:flex;justify-content:space-between;gap:10px;align-items:center}
.mini-label{color:rgba(255,255,255,.55);font-size:12px}
.mini-val{font-size:18px;font-weight:900}
.small-note{color:rgba(255,255,255,.50);font-size:11px;line-height:1.8;margin-top:6px}

.form-card{background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.015));border:1px solid rgba(255,255,255,.08);border-radius:var(--radius-md);padding:14px;margin-bottom:14px}
.form-title{font-weight:900;margin-bottom:6px}
.form-grid{display:grid;grid-template-columns:1fr;gap:10px}
@media (min-width: 720px){.form-grid{grid-template-columns:1fr 1fr}}
.field label{display:block;color:var(--color-sub);font-size:12px;margin-bottom:6px}
.field input,.field textarea{width:100%;padding:12px 12px;border-radius:12px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);color:var(--color-text);outline:none}
.field textarea{min-height:88px;resize:vertical}
.field input:focus,.field textarea:focus{border-color:rgba(225,48,108,.45);box-shadow:0 0 0 2px rgba(225,48,108,.12)}

.page-shell{animation:fadeUp .45s ease;max-width:720px;margin:0 auto}
.hero-badge{
  width:80px;height:80px;border-radius:24px;margin:0 auto 16px;
  background:var(--brand-gradient);
  display:flex;align-items:center;justify-content:center;
  font-size:36px;box-shadow:0 8px 32px rgba(225,48,108,.3)
}
.panel-card{
  background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.015));
  border:1px solid rgba(255,255,255,.08);
  border-radius:var(--radius-xl);
  padding:24px;
}
.primary-cta{
  width:100%;margin-top:16px;padding:14px 0;border:none;border-radius:14px;
  color:#fff;font-size:15px;font-weight:800;cursor:pointer;
  background:var(--brand-gradient);background-size:200% 200%;
  animation:gradientMove 3s ease infinite
}
.status-strip{
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(46,204,113,.06);
  border:1px solid rgba(46,204,113,.15);
  border-radius:12px;
  padding:10px 16px;
  margin-bottom:16px;
  font-size:12px;
}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px}
.stats-card{
  background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.015));
  border:1px solid rgba(255,255,255,.08);
  border-radius:14px;
  padding:16px;
  text-align:center;
}
@media (max-width: 720px){.stats-grid{grid-template-columns:repeat(2,1fr)}}

.wall-admin-actions{display:flex;gap:6px;margin-top:14px;flex-wrap:wrap}
.wall-action-btn{
  flex:1;min-width:60px;padding:8px 0;border-radius:10px;
  font-size:12px;font-weight:800;cursor:pointer
}
.wall-action-neutral{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.8)}
.wall-delete-btn{
  padding:8px 14px;border-radius:10px;font-size:12px;cursor:pointer;
  background:rgba(231,76,60,0.08);border:1px solid rgba(231,76,60,0.15);color:rgba(231,76,60,0.7)
}
.reply-box{margin-top:8px;display:none}
.reply-textarea{
  width:100%;min-height:80px;border-radius:10px;border:1px solid rgba(255,255,255,0.12);
  background:rgba(255,255,255,0.04);color:var(--color-text);padding:10px;font-size:13px
}
.reply-action-row{display:flex;gap:8px;margin-top:6px;justify-content:flex-end}
.public-reply-toggle{
  background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.12);
  border-radius:999px;padding:5px 12px;font-size:12px;color:rgba(255,255,255,0.75);cursor:pointer
}
.public-reply-input{
  width:100%;padding:8px 10px;border-radius:8px;border:1px solid rgba(255,255,255,0.12);
  background:rgba(255,255,255,0.03);color:var(--color-text);font-size:12px;margin-bottom:6px
}
.public-reply-textarea{
  width:100%;min-height:70px;border-radius:8px;border:1px solid rgba(255,255,255,0.12);
  background:rgba(255,255,255,0.04);color:var(--color-text);padding:8px 10px;font-size:13px
}

.codebox{
  display:flex; gap:8px; align-items:center; flex-wrap:wrap;
  padding:10px 12px; border-radius:12px;
  border:1px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.03);
  margin-bottom:10px;
}
.codechip{
  font-weight:900; letter-spacing:1px;
  padding:6px 10px; border-radius:10px;
  border:1px solid rgba(225,48,108,.25);
  background:rgba(225,48,108,.12);
  color:rgba(255,255,255,.92);
}
</style>
</head>
<body>

<div id="toast"></div>

<div id="modal-backdrop" class="modal-backdrop" onclick="closeModal()"></div>

<!-- Share Modal -->
<div id="share-modal" class="modal" role="dialog" aria-modal="true" aria-hidden="true" onclick="event.stopPropagation()">
  <div class="modal-header">
    <div class="modal-title">📸 一鍵分享限時動態</div>
    <button class="modal-close" onclick="closeModal()" title="關閉">✕</button>
  </div>

  <div class="modal-sub" id="share-modal-sub"></div>

  <div class="codebox" id="share-codebox" style="display:none;">
    <div style="color:rgba(255,255,255,.65);font-size:12px;">你的編輯碼</div>
    <div class="codechip" id="share-edit-code"></div>
    <button class="action-btn" style="min-width:140px;flex:0 0 auto;padding:10px 12px" onclick="copyEditLink()">🔗 複製編輯連結</button>
    <button class="action-btn" style="min-width:140px;flex:0 0 auto;padding:10px 12px" onclick="openEditModalWithLast()">✏️ 立刻編輯</button>
  </div>

  <div class="modal-preview">
    <img id="share-preview-img" alt="Story Preview" />
  </div>

  <div class="modal-actions">
    <button class="action-btn primary" onclick="sharePromoStory()">🚀 分享名片限動</button>
    <button class="action-btn" onclick="copySiteLink()">📋 複製網站連結</button>
    <button class="action-btn" onclick="copyIgLink()">📋 複製 IG 連結</button>
    <button class="action-btn danger" onclick="closeModal()">先不要</button>
  </div>

  <div class="small-note" style="margin-top:10px;">
    提醒：IG 的可點連結通常要用你在 IG 編輯器自己加的「Link Sticker」（建議貼網站連結，網站內再連 IG）。
  </div>
</div>

<!-- Edit Modal -->
<div id="edit-modal" class="modal" role="dialog" aria-modal="true" aria-hidden="true" onclick="event.stopPropagation()">
  <div class="modal-header">
    <div class="modal-title">✏️ 編輯我的匿名留言</div>
    <button class="modal-close" onclick="closeModal()" title="關閉">✕</button>
  </div>

  <div class="modal-sub">
    貼上你的「編輯連結」或「訊息ID.編輯碼」即可載入。這不需要登入，但只有持有編輯碼的人才能改。
  </div>

  <div class="field" style="margin-bottom:10px;">
    <label>編輯連結 / Token</label>
    <input id="edit-token-input" placeholder="例如：https://xxx/#edit=abc123.XYZ9K... 或 abc123.XYZ9K..." />
  </div>

  <div style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px;">
    <button class="action-btn primary" style="min-width:160px" onclick="loadEditFromToken()">載入</button>
    <button class="action-btn" style="min-width:160px" onclick="pasteFromClipboard()">從剪貼簿貼上</button>
  </div>

  <div class="field" style="margin-bottom:10px;">
    <label>匿名暱稱（可不填）</label>
    <input id="edit-alias" placeholder="例如：匿名小可愛 / 你想要的暱稱" disabled />
  </div>

  <div class="field">
    <label>留言內容</label>
    <textarea id="edit-text" placeholder="修改你的留言內容..." disabled></textarea>
  </div>

  <div class="modal-actions">
    <button class="action-btn primary" onclick="saveEdit()" id="save-edit-btn" disabled>💾 儲存修改</button>
    <button class="action-btn danger" onclick="closeModal()">取消</button>
  </div>

  <div class="small-note" id="edit-meta" style="margin-top:10px;"></div>
</div>

<nav class="nav">
  <div class="nav-content">
    <div class="nav-title" onclick="showPage('home')">想對Miiduoa說什麼</div>

    <div class="nav-right">
      <div class="nav-btns">
        <button class="nav-btn" data-page="home" onclick="showPage('home')">✉️ 留言</button>
        <button class="nav-btn" data-page="wall" onclick="showPage('wall')">🌟 牆</button>
        <button class="nav-btn" data-page="admin" onclick="showPage('admin')">🔐 管理</button>
      </div>

      <div class="nav-avatar-wrap">
        <a class="nav-avatar-link" id="ig-avatar-link"
           href="https://www.instagram.com/miiduoa?igsh=MWM1eDJzOXpuNWdyOA%3D%3D&utm_source=qr"
           target="_blank" rel="noopener noreferrer"
           title="前往 miiduoa IG">
          <img id="admin-avatar-img" class="nav-avatar-img" alt="Miiduoa Avatar" />
          <div id="admin-avatar-fallback" class="nav-avatar-fallback">M</div>
        </a>

        <button id="avatar-edit-btn" class="avatar-edit-btn" onclick="openAvatarPicker()">更換</button>
        <input id="avatar-file" type="file" accept="image/*" style="display:none" />
      </div>
    </div>
  </div>
</nav>

<div class="container" id="app"></div>

<script src="app.js"></script>

</body>
</html>
